<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kerala Sunrise</title>

<style>

/* ---------- RESET ---------- */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* ---------- BACKGROUND ---------- */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

/* Kerala Sunrise 4K */
background:
linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.45)),
url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
center/cover no-repeat;
}

/* ---------- GLASS ISLAND ---------- */
.island{
padding:60px 80px;
border-radius:30px;
text-align:center;
cursor:pointer;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.35);

color:white;

transition:all .4s ease;
box-shadow:0 20px 60px rgba(0,0,0,.35);
}

/* Hover = cursor enters island */
.island:hover{
transform:translateY(-8px) scale(1.03);
background:rgba(255,255,255,0.22);
box-shadow:0 30px 80px rgba(0,0,0,.45);
}

/* TITLE */
h1{
font-size:42px;
font-weight:600;
letter-spacing:-1px;
margin-bottom:15px;
}

/* TEXT */
p{
opacity:.85;
margin-bottom:35px;
}

/* ENTER BUTTON STYLE */
.enter{
display:inline-block;
padding:14px 36px;
border-radius:40px;
background:rgba(255,255,255,.25);
transition:.35s;
}

/* Cursor enters button */
.enter:hover{
background:white;
color:black;
transform:scale(1.08);
}

/* PAGE TRANSITION */
.fade-out{
opacity:0;
transform:scale(1.1);
transition:0.8s ease;
}

</style>
</head>

<body>

<!-- WHOLE ISLAND CLICKABLE -->
<div class="island" onclick="enterSite()">

<h1>Kerala</h1>
<p>Begin your journey through God's Own Country</p>

<div class="enter">Enter</div>

</div>

<script>

function enterSite(){
document.body.classList.add("fade-out");

setTimeout(()=>{
window.location.href="main.html";
},700);
}

</script>

</body>
</html>
