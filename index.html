<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome | Kerala Experience</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* Kerala Background */
body{
    height:100vh;
    background:url("https://images.unsplash.com/photo-1593693397690-362cb9666fc2") no-repeat center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Glass Card */
.glass{
    width:420px;
    padding:40px;
    text-align:center;
    border-radius:20px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 8px 32px rgba(0,0,0,0.25);
    color:white;
}

/* Title */
.glass h1{
    font-size:32px;
    margin-bottom:15px;
}

.glass p{
    font-size:16px;
    margin-bottom:30px;
    opacity:0.9;
}

/* Button */
.enter-btn{
    padding:12px 28px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;

    background:rgba(255,255,255,0.25);
    color:white;
    backdrop-filter: blur(10px);

    transition:0.3s;
}

.enter-btn:hover{
    background:white;
    color:black;
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="glass">
    <h1>Welcome to Kerala</h1>
    <p>Experience nature, peace, and beauty through a modern digital journey.</p>

    <a href="main.html">
        <button class="enter-btn">Enter Website</button>
    </a>
</div>

</body>
</html>
