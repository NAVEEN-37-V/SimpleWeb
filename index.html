<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kerala Experience</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;}

body{
height:100vh;
overflow:hidden;
background:url("https://images.unsplash.com/photo-1593693397690-362cb9666fc2")
center/cover no-repeat;
transition:1s ease;
}

/* LOADER */
.loader{
position:fixed;
inset:0;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:22px;
letter-spacing:3px;
z-index:9999;
animation:fadeLoader 2s forwards 1.8s;
}

@keyframes fadeLoader{
to{opacity:0;visibility:hidden;}
}

/* MIST EFFECT */
body::after{
content:"";
position:absolute;
inset:0;
background:radial-gradient(circle at 30% 70%,
rgba(255,255,255,0.15),transparent 60%);
animation:mist 8s infinite alternate ease-in-out;
}

@keyframes mist{
from{transform:translateX(-40px);}
to{transform:translateX(40px);}
}

/* GLASS CARD */
.glass{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:440px;
padding:50px;
text-align:center;
border-radius:28px;

background:rgba(255,255,255,0.18);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.3);

color:white;
box-shadow:0 20px 60px rgba(0,0,0,.35);
animation:appear 1.5s ease;
}

@keyframes appear{
from{opacity:0;transform:translate(-50%,-40%) scale(.9);}
to{opacity:1;transform:translate(-50%,-50%) scale(1);}
}

h1{font-size:36px;margin-bottom:15px;}
p{opacity:.9;margin-bottom:35px;}

/* BUTTON DEPTH */
.enter{
padding:14px 34px;
border-radius:40px;
border:none;
background:rgba(255,255,255,.25);
color:white;
cursor:pointer;
transition:.35s;
}

.enter:hover{
transform:translateY(-4px) scale(1.07);
background:white;
color:black;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

/* BLUR TRANSITION */
.blur-out{
filter:blur(12px);
opacity:0;
transform:scale(1.1);
transition:1s;
}

</style>
</head>

<body>

<div class="loader">KERALA EXPERIENCE</div>

<div class="glass">
<h1>Welcome to Kerala</h1>
<p>A cinematic digital journey through nature.</p>
<button class="enter" onclick="go()">Enter</button>
</div>

<script>
function go(){
document.body.classList.add("blur-out");
setTimeout(()=>{
window.location="main.html";
},900);
}
</script>

</body>
</html>
